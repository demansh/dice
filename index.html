<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Roller</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #ffffff;
      user-select: none;
      -webkit-user-select: none;
    }

    .game-field {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 32px 76px;
      touch-action: manipulation;
    }

    .dice-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .die {
      width: 72px;
      height: 72px;
      display: block;
    }

    @media (min-width: 480px) {
      .die { width: 80px; height: 80px; }
      .dice-area { gap: 8px; }
    }

    @media (min-width: 768px) {
      .die { width: 100px; height: 100px; }
      .dice-area { gap: 12px; }
    }

    .btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border: 2px solid #444;
      border-radius: 50%;
      background: #ffffff;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      color: #333;
      touch-action: manipulation;
      padding: 0;
      transition: background-color 0.15s ease, opacity 0.2s ease;
    }

    .btn:not(:disabled):hover {
      background-color: #f0f0f0;
    }

    .btn:not(:disabled):active {
      background-color: #e0e0e0;
    }

    .btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    #btnMinus {
      left: 14px;
    }

    #btnPlus {
      right: 14px;
    }

    @media (min-width: 768px) {
      .btn { width: 56px; height: 56px; font-size: 32px; }
      #btnMinus { left: 24px; }
      #btnPlus { right: 24px; }
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
    <symbol id="die-1" viewBox="0 0 200 200">
      <g transform="translate(0 -922.52)" stroke="#000" stroke-linecap="square">
        <rect x="10" y="932.52" width="180" height="180" rx="24" ry="24" fill="#fff" stroke-width="9.6"/>
        <circle cx="100" cy="1022.5" r="20"/>
      </g>
    </symbol>
    <symbol id="die-2" viewBox="0 0 200 200">
      <g transform="translate(0 -922.52)" stroke="#000" stroke-linecap="square">
        <rect x="10" y="932.52" width="180" height="180" rx="24" ry="24" fill="#fff" stroke-width="9.6"/>
        <circle cx="150" cy="972.52" r="20"/>
        <circle cx="50" cy="1072.5" r="20"/>
      </g>
    </symbol>
    <symbol id="die-3" viewBox="0 0 200 200">
      <g transform="translate(0 -922.52)" stroke="#000" stroke-linecap="square">
        <rect x="10" y="932.52" width="180" height="180" rx="24" ry="24" fill="#fff" stroke-width="9.6"/>
        <circle cx="100" cy="1022.5" r="20"/>
        <circle cx="150" cy="972.52" r="20"/>
        <circle cx="50" cy="1072.5" r="20"/>
      </g>
    </symbol>
    <symbol id="die-4" viewBox="0 0 200 200">
      <g transform="translate(0 -922.52)" stroke="#000" stroke-linecap="square">
        <rect x="10" y="932.52" width="180" height="180" rx="24" ry="24" fill="#fff" stroke-width="9.6"/>
        <circle cx="50" cy="972.52" r="20"/>
        <circle cx="150" cy="972.52" r="20"/>
        <circle cx="50" cy="1072.5" r="20"/>
        <circle cx="150" cy="1072.5" r="20"/>
      </g>
    </symbol>
    <symbol id="die-5" viewBox="0 0 200 200">
      <g transform="translate(0 -922.52)" stroke="#000" stroke-linecap="square">
        <rect x="10" y="932.52" width="180" height="180" rx="24" ry="24" fill="#fff" stroke-width="9.6"/>
        <circle cx="100" cy="1022.5" r="20"/>
        <circle cx="150" cy="972.52" r="20"/>
        <circle cx="50" cy="1072.5" r="20"/>
        <circle cx="50" cy="972.52" r="20"/>
        <circle cx="150" cy="1072.5" r="20"/>
      </g>
    </symbol>
    <symbol id="die-6" viewBox="0 0 200 200">
      <g transform="translate(0 -922.52)" stroke="#000" stroke-linecap="square">
        <rect x="10" y="932.52" width="180" height="180" rx="24" ry="24" fill="#fff" stroke-width="9.6"/>
        <circle cx="50" cy="972.52" r="20"/>
        <circle cx="150" cy="972.52" r="20"/>
        <circle cx="50" cy="1022.5" r="20"/>
        <circle cx="150" cy="1022.5" r="20"/>
        <circle cx="50" cy="1072.5" r="20"/>
        <circle cx="150" cy="1072.5" r="20"/>
      </g>
    </symbol>
  </svg>

  <div class="game-field" id="gameField">
    <div class="dice-area" id="diceArea"></div>
  </div>
  <button class="btn" id="btnMinus" type="button">−</button>
  <button class="btn" id="btnPlus" type="button">+</button>

  <script>
    const MIN_DICE = 1;
    const MAX_DICE = 10;
    const DEFAULT_DICE = 2;
    const ANIM_DURATION = 500;
    const ANIM_STEP = 100;
    const COOLDOWN = 150;

    const diceState = Array.from({ length: MAX_DICE }, () => Math.floor(Math.random() * 6));
    let diceCount = DEFAULT_DICE;
    let isLocked = false;

    function readCountFromURL() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get('count');
      const n = parseInt(raw, 10);
      if (Number.isInteger(n) && n >= MIN_DICE && n <= MAX_DICE) return n;
      return DEFAULT_DICE;
    }

    function writeCountToURL(n) {
      const url = new URL(window.location.href);
      url.searchParams.set('count', n);
      history.replaceState(null, '', url);
    }

    function renderDice(override) {
      const area = document.getElementById('diceArea');
      const values = override || diceState.slice(0, diceCount);
      area.innerHTML = '';
      values.forEach(v => {
        const el = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        el.setAttribute('class', 'die');
        const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
        use.setAttribute('href', `#die-${v + 1}`);
        el.appendChild(use);
        area.appendChild(el);
      });
    }

    function updateButtons() {
      document.getElementById('btnMinus').disabled = diceCount <= MIN_DICE;
      document.getElementById('btnPlus').disabled = diceCount >= MAX_DICE;
    }

    function randomValues(n) {
      return Array.from({ length: n }, () => Math.floor(Math.random() * 6));
    }

    function randomFlashColor() {
      const h = Math.floor(Math.random() * 360);
      return `hsl(${h}, 75%, 82%)`;
    }

    function startRoll() {
      if (isLocked) return;
      isLocked = true;

      document.body.style.transition = 'none';
      document.body.style.backgroundColor = randomFlashColor();
      document.body.offsetHeight;
      document.body.style.transition = 'background-color 1s ease';
      document.body.style.backgroundColor = '#ffffff';

      renderDice(randomValues(diceCount));

      let step = 0;
      const totalSteps = ANIM_DURATION / ANIM_STEP;

      function tick() {
        step++;
        if (step < totalSteps) {
          renderDice(randomValues(diceCount));
          setTimeout(tick, ANIM_STEP);
        } else {
          for (let i = 0; i < MAX_DICE; i++) {
            diceState[i] = Math.floor(Math.random() * 6);
          }
          renderDice();
          setTimeout(() => { isLocked = false; }, COOLDOWN);
        }
      }

      setTimeout(tick, ANIM_STEP);
    }

    let touchActivated = false;
    document.getElementById('gameField').addEventListener('touchstart', e => {
      e.preventDefault();
      touchActivated = true;
      startRoll();
    }, { passive: false });
    document.getElementById('gameField').addEventListener('click', () => {
      if (touchActivated) { touchActivated = false; return; }
      startRoll();
    });

    function applyCount(delta) {
      const next = diceCount + delta;
      if (next < MIN_DICE || next > MAX_DICE) return;
      diceCount = next;
      writeCountToURL(diceCount);
      updateButtons();
      renderDice();
    }

    document.getElementById('btnMinus').addEventListener('pointerdown', e => {
      e.preventDefault();
      applyCount(-1);
    });

    document.getElementById('btnPlus').addEventListener('pointerdown', e => {
      e.preventDefault();
      applyCount(1);
    });

    diceCount = readCountFromURL();
    writeCountToURL(diceCount);
    updateButtons();
    renderDice();
  </script>
</body>
</html>
